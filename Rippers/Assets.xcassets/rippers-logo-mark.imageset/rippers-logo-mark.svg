<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!--
    Rippers mark v4 — fat MTB tyre ring framing a bold mountain drop.
    Single dramatic peak with hard right cliff. Clean, no clutter.
    Reads at 20px and looks great at 1024px.
    Ring: outer r=88, inner r=68 (20-unit fat tyre cross-section).
  -->

  <defs>
    <clipPath id="wc">
      <circle cx="100" cy="100" r="68"/>
    </clipPath>
  </defs>

  <!-- ── MOUNTAIN SCENE (inside wheel) ──────────────────── -->
  <g clip-path="url(#wc)">

    <!--
      Terrain: left foothills rise to a dramatic off-centre peak,
      then a near-vertical right cliff drops into a valley,
      with a secondary ridge on the far right.
    -->
    <path fill="white"
      d="M 0,200
         L 0,145
         L 42,115 L 64,138
         L 94,46
         L 132,130 L 162,108 L 200,124
         L 200,200
         Z"/>

    <!-- Shadow on the steep right cliff face — depth and drama -->
    <path fill="black" fill-opacity="0.20"
      d="M 94,46 L 132,130 L 94,130 Z"/>

  </g>

  <!-- ── FAT TYRE RING ───────────────────────────────────── -->
  <!--
    Outer path CW (0,1 sweep), inner path CCW (0,0 sweep).
    fill-rule=evenodd subtracts inner from outer → clean ring.
  -->
  <path fill="white" fill-rule="evenodd"
    d="
      M 100,12
      A 88,88 0 0,1 188,100
      A 88,88 0 0,1 100,188
      A 88,88 0 0,1 12,100
      A 88,88 0 0,1 100,12
      Z
      M 100,32
      A 68,68 0 0,0 32,100
      A 68,68 0 0,0 100,168
      A 68,68 0 0,0 168,100
      A 68,68 0 0,0 100,32
      Z
    "/>

</svg>
