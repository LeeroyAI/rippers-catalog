<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <rect width="480" height="320" fill="#f2f0eb"/>
  <!-- rear wheel -->
  <circle cx="152" cy="210" r="72" stroke="#d4d0c9" stroke-width="10" fill="none"/>
  <circle cx="152" cy="210" r="10" fill="#d4d0c9"/>
  <!-- front wheel -->
  <circle cx="328" cy="210" r="72" stroke="#d4d0c9" stroke-width="10" fill="none"/>
  <circle cx="328" cy="210" r="10" fill="#d4d0c9"/>
  <!-- frame: chainstay + seat tube -->
  <line x1="152" y1="210" x2="240" y2="128" stroke="#d4d0c9" stroke-width="10" stroke-linecap="round"/>
  <line x1="240" y1="128" x2="152" y2="210" stroke="#d4d0c9" stroke-width="10" stroke-linecap="round"/>
  <!-- seat tube -->
  <line x1="240" y1="128" x2="248" y2="88" stroke="#d4d0c9" stroke-width="9" stroke-linecap="round"/>
  <!-- saddle -->
  <line x1="230" y1="86" x2="266" y2="86" stroke="#d4d0c9" stroke-width="8" stroke-linecap="round"/>
  <!-- top tube -->
  <line x1="240" y1="128" x2="304" y2="120" stroke="#d4d0c9" stroke-width="10" stroke-linecap="round"/>
  <!-- down tube -->
  <line x1="304" y1="120" x2="240" y2="128" stroke="#d4d0c9" stroke-width="10" stroke-linecap="round"/>
  <!-- fork -->
  <line x1="304" y1="120" x2="328" y2="210" stroke="#d4d0c9" stroke-width="9" stroke-linecap="round"/>
  <!-- head tube -->
  <line x1="304" y1="120" x2="310" y2="136" stroke="#c8c4bc" stroke-width="12" stroke-linecap="round"/>
  <!-- handlebar stem -->
  <line x1="310" y1="124" x2="324" y2="118" stroke="#d4d0c9" stroke-width="8" stroke-linecap="round"/>
  <line x1="324" y1="112" x2="324" y2="124" stroke="#d4d0c9" stroke-width="7" stroke-linecap="round"/>
  <!-- crank / BB -->
  <circle cx="240" cy="210" r="12" fill="#d4d0c9"/>
  <line x1="240" y1="210" x2="152" y2="210" stroke="#d4d0c9" stroke-width="6" stroke-linecap="round"/>
</svg>
